version: '3.9'

services:

  postgres:
    image: postgres:16-alpine
    container_name: smart_city_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_city_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 37533753
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_city_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: smart_city_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart_city_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smart_city_hub
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 37533753
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: incident-photos
      JWT_SECRET: U21hcnRDaXR5SHViU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uTXVzdEJlQXRMZWFzdDI1NkJpdHNMb25nIQ==
      JWT_ACCESS_TOKEN_VALIDITY: 86400000
      JWT_REFRESH_TOKEN_VALIDITY: 2592000000
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_ADMIN_EMAIL: ${APP_ADMIN_EMAIL:-admin@smartcityhub.com}
      APP_ADMIN_DASHBOARD_URL: ${APP_ADMIN_DASHBOARD_URL:-http://localhost:3000/admin/users/pending}
      APP_LOGIN_URL: ${APP_LOGIN_URL:-http://localhost:3000/login}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  minio_data:
