# Application Name
spring.application.name=Smart City Hub

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_city_hub
spring.datasource.username=postgres
spring.datasource.password=37533753
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Servlet Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=U21hcnRDaXR5SHViU2VjcmV0S2V5Rm9ySldUVG9rZW5HZW5lcmF0aW9uTXVzdEJlQXRMZWFzdDI1NkJpdHNMb25nIQ==
jwt.access-token-validity=86400000
jwt.refresh-token-validity=2592000000

# Logging Configuration
logging.level.com.smartlogi.smart_city_hub=DEBUG
logging.level.org.springframework.security=DEBUG

# Springdoc OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
